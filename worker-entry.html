<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסת עובד</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .card {
            background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 2rem; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .lang-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.5rem; }
        .lang-btn {
            padding: 4px 10px; border-radius: 8px; border: 1px solid #475569;
            background: #334155; color: #94a3b8; font-size: 0.8rem; cursor: pointer;
            font-family: 'Heebo', sans-serif; transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover { background: #2563eb; color: white; border-color: #2563eb; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header .icon {
            width: 70px; height: 70px; background: linear-gradient(135deg, #2563eb, #8b5cf6);
            border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
        }
        .header .icon svg { width: 36px; height: 36px; color: white; }
        .header h1 { font-size: 1.5rem; font-weight: 800; }
        .header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.3rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #94a3b8; font-size: 0.9rem; }
        .form-group label .req { color: #ef4444; }
        .form-group input {
            width: 100%; padding: 0.85rem 1rem; background: #334155;
            border: 1px solid #475569; border-radius: 10px; color: #f1f5f9;
            font-family: 'Heebo', sans-serif; font-size: 1rem; transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .btn {
            display: block; width: 100%; padding: 1rem; border: none; border-radius: 12px;
            font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: all 0.2s; margin-top: 1.5rem; background: #2563eb; color: white;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .success { display: none; text-align: center; }
        .success.show { display: block; }
        .success-icon {
            width: 80px; height: 80px; background: linear-gradient(135deg, #059669, #10b981);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;
        }
        .success-icon svg { width: 40px; height: 40px; color: white; }
        .success h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
        .success p { color: #94a3b8; margin-bottom: 1rem; }
        .summary-box {
            background: #334155; border-radius: 10px; padding: 1.2rem;
            text-align: right; margin: 1.5rem 0; font-size: 0.95rem; line-height: 2;
        }
        .summary-box strong { color: #3b82f6; }
        .btn-back { background: #334155; border: 1px solid #475569; color: #f1f5f9; margin-top: 1rem; }
        .btn-back:hover { background: #475569; }
        @media (max-width: 480px) { .card { padding: 1.5rem; } .header h1 { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div class="card">
        <div id="langSelector" class="lang-bar"></div>
        <div id="formView">
            <div class="header">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <h1 id="t-title"></h1>
                <p id="t-subtitle"></p>
            </div>
            <form id="entryForm" onsubmit="submitEntry(event)">
                <div class="form-group">
                    <label id="t-numLabel"></label>
                    <input type="text" id="workerId" required pattern="[0-9]{2,9}" inputmode="numeric">
                    <p id="workerInfo" style="color: #10b981; font-size: 0.85rem; margin-top: 0.4rem; display: none;"></p>
                    <p id="workerError" style="color: #ef4444; font-size: 0.85rem; margin-top: 0.4rem; display: none;"></p>
                </div>
                <input type="hidden" id="fullName">
                <input type="hidden" id="role">
                <div class="form-group" id="projectGroup" style="display: none;">
                    <label id="t-projectLabel" style="font-weight: 600; color: #94a3b8; font-size: 0.9rem;">פרויקט <span class="req">*</span></label>
                    <select id="projectSelect" required style="width: 100%; padding: 0.85rem 1rem; background: #334155; border: 1px solid #475569; border-radius: 10px; color: #f1f5f9; font-family: 'Heebo', sans-serif; font-size: 1rem;"></select>
                </div>
                <button type="submit" class="btn" id="submitBtn" disabled></button>
            </form>
        </div>
        <div id="successView" class="success">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            <h2 id="t-success"></h2>
            <p id="t-dataSent"></p>
            <div id="summary" class="summary-box"></div>
            <button class="btn btn-back" onclick="resetForm()" id="t-backBtn"></button>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="translations.js"></script>
    <script>
        let currentWorker = null;
        const workerIdInput = document.getElementById('workerId');
        let lookupTimeout = null;

        function applyTranslations() {
            document.getElementById('t-title').textContent = T('entryTitle');
            document.getElementById('t-subtitle').textContent = T('entrySubtitle');
            document.getElementById('t-numLabel').innerHTML = T('workerNumber') + ' <span class="req">*</span>';
            document.getElementById('workerId').placeholder = T('workerNumberPlaceholder');
            document.getElementById('submitBtn').textContent = currentWorker ? T('entryBtn') : T('enterNumberFirst');
            document.getElementById('t-success').textContent = T('entrySuccess');
            document.getElementById('t-dataSent').textContent = T('dataSent');
            document.getElementById('t-backBtn').textContent = T('backToForm');
            buildLanguageSelector();
        }

        workerIdInput.addEventListener('input', function() {
            clearTimeout(lookupTimeout);
            const val = this.value.trim();
            if (val.length >= 2) {
                lookupTimeout = setTimeout(() => lookupWorker(val), 400);
            } else {
                resetWorkerInfo();
            }
        });

        async function lookupWorker(number) {
            const info = document.getElementById('workerInfo');
            const error = document.getElementById('workerError');
            const btn = document.getElementById('submitBtn');
            info.style.display = 'none';
            error.style.display = 'none';

            try {
                const results = await supabaseSelectWhere('workers', 'worker_number', number);
                if (results && results.length > 0) {
                    currentWorker = results[0];
                    document.getElementById('fullName').value = currentWorker.full_name;
                    document.getElementById('role').value = currentWorker.role;
                    const roleDisplay = TRANSLATIONS[currentLang].roles[currentWorker.role] || currentWorker.role;
                    info.textContent = currentWorker.full_name + ' - ' + roleDisplay;
                    info.style.display = 'block';
                    await loadProjects();
                    btn.disabled = false;
                    btn.textContent = T('entryBtn');
                } else {
                    resetWorkerInfo();
                    error.textContent = T('workerNotFound');
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = T('searchError') + err.message;
                error.style.display = 'block';
            }
        }

        async function loadProjects() {
            try {
                const projects = await supabaseSelectAll('projects');
                const select = document.getElementById('projectSelect');
                const group = document.getElementById('projectGroup');
                if (projects && projects.length > 0) {
                    select.innerHTML = projects.filter(p => p.active).map(p =>
                        `<option value="${p.name}">${p.name}</option>`
                    ).join('');
                    group.style.display = 'block';
                }
            } catch (e) { console.log('Error loading projects:', e.message); }
        }

        function resetWorkerInfo() {
            currentWorker = null;
            document.getElementById('fullName').value = '';
            document.getElementById('role').value = '';
            document.getElementById('workerInfo').style.display = 'none';
            document.getElementById('workerError').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = T('enterNumberFirst');
        }

        async function submitEntry(e) {
            e.preventDefault();
            if (!currentWorker) return;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = T('sending');

            const fullName = currentWorker.full_name;
            const role = currentWorker.role;
            const workerId = document.getElementById('workerId').value.trim();
            const now = new Date();

            try {
                const project = document.getElementById('projectSelect').value || '';
                await supabaseInsert('attendance', {
                    type: 'checkin',
                    full_name: fullName,
                    role: role,
                    worker_id: workerId,
                    project: project,
                    time_display: now.toLocaleString('he-IL'),
                    date: now.toLocaleDateString('he-IL')
                });

                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').classList.add('show');
                const roleDisplay = TRANSLATIONS[currentLang].roles[role] || role;
                document.getElementById('summary').innerHTML =
                    `<strong>${T('lblName')}:</strong> ${fullName}<br>` +
                    `<strong>${T('lblRole')}:</strong> ${roleDisplay}<br>` +
                    `<strong>${T('lblWorkerNum')}:</strong> ${workerId}<br>` +
                    `<strong>${T('lblEntryTime')}:</strong> ${now.toLocaleString('he-IL')}`;
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = T('entryBtn');
            }
        }

        function resetForm() {
            document.getElementById('entryForm').reset();
            document.getElementById('formView').style.display = 'block';
            document.getElementById('successView').classList.remove('show');
            currentWorker = null;
            resetWorkerInfo();
        }

        buildLanguageSelector();
        applyTranslations();
    </script>
</body>
</html>
