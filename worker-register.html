<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רישום עובד חדש</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .card {
            background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 2rem; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .lang-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.5rem; }
        .lang-btn {
            padding: 4px 10px; border-radius: 8px; border: 1px solid #475569;
            background: #334155; color: #94a3b8; font-size: 0.8rem; cursor: pointer;
            font-family: 'Heebo', sans-serif; transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover { background: #059669; color: white; border-color: #059669; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header .icon {
            width: 70px; height: 70px; background: linear-gradient(135deg, #059669, #10b981);
            border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
        }
        .header .icon svg { width: 36px; height: 36px; color: white; }
        .header h1 { font-size: 1.5rem; font-weight: 800; }
        .header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.3rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #94a3b8; font-size: 0.9rem; }
        .form-group label .req { color: #ef4444; }
        .form-group input, .form-group select {
            width: 100%; padding: 0.85rem 1rem; background: #334155;
            border: 1px solid #475569; border-radius: 10px; color: #f1f5f9;
            font-family: 'Heebo', sans-serif; font-size: 1rem; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #059669; box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
        }
        .btn {
            display: block; width: 100%; padding: 1rem; border: none; border-radius: 12px;
            font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: all 0.2s; margin-top: 1.5rem; background: #059669; color: white;
        }
        .btn:hover { background: #047857; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .success { display: none; text-align: center; }
        .success.show { display: block; }
        .success-icon {
            width: 80px; height: 80px; background: linear-gradient(135deg, #059669, #10b981);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;
        }
        .success-icon svg { width: 40px; height: 40px; color: white; }
        .success h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
        .success p { color: #94a3b8; margin-bottom: 1rem; }
        .worker-number {
            font-size: 3rem; font-weight: 800; color: #10b981;
            background: #334155; border-radius: 12px; padding: 1rem; margin: 1rem 0;
        }
        .worker-number small { display: block; font-size: 0.9rem; color: #94a3b8; font-weight: 400; margin-bottom: 0.5rem; }
        .summary-box {
            background: #334155; border-radius: 10px; padding: 1.2rem;
            text-align: right; margin: 1.5rem 0; font-size: 0.95rem; line-height: 2;
        }
        .summary-box strong { color: #10b981; }
        .btn-back { background: #334155; border: 1px solid #475569; color: #f1f5f9; margin-top: 1rem; }
        .btn-back:hover { background: #475569; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        @media (max-width: 480px) { .card { padding: 1.5rem; } .header h1 { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div class="card">
        <div id="langSelector" class="lang-bar"></div>
        <div id="formView">
            <div class="header">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <h1 id="t-title"></h1>
                <p id="t-subtitle"></p>
            </div>
            <form id="registerForm" onsubmit="submitRegister(event)">
                <div class="form-group">
                    <label id="t-nameLabel"></label>
                    <input type="text" id="fullName" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label id="t-idLabel"></label>
                    <input type="text" id="idNumber" required pattern="[0-9]{5,9}" title="5-9 digits" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label id="t-roleLabel"></label>
                    <select id="role" required></select>
                </div>
                <p id="errorMsg" class="error-msg"></p>
                <button type="submit" class="btn" id="submitBtn"></button>
            </form>
        </div>
        <div id="successView" class="success">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            <h2 id="t-success"></h2>
            <p id="t-saveMsg"></p>
            <div class="worker-number">
                <small id="t-yourNum"></small>
                <span id="workerNumber"></span>
            </div>
            <div id="summary" class="summary-box"></div>
            <button class="btn btn-back" onclick="resetForm()" id="t-anotherBtn"></button>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="translations.js"></script>
    <script>
        function applyTranslations() {
            document.getElementById('t-title').textContent = T('regTitle');
            document.getElementById('t-subtitle').textContent = T('regSubtitle');
            document.getElementById('t-nameLabel').innerHTML = T('fullName') + ' <span class="req">*</span>';
            document.getElementById('fullName').placeholder = T('fullNamePlaceholder');
            document.getElementById('t-idLabel').innerHTML = T('idNumber') + ' <span class="req">*</span>';
            document.getElementById('idNumber').placeholder = T('idPlaceholder');
            document.getElementById('t-roleLabel').innerHTML = T('profession') + ' <span class="req">*</span>';
            document.getElementById('submitBtn').textContent = T('registerBtn');
            document.getElementById('t-success').textContent = T('regSuccess');
            document.getElementById('t-saveMsg').textContent = T('regSaveNumber');
            document.getElementById('t-yourNum').textContent = T('yourNumber');
            document.getElementById('t-anotherBtn').textContent = T('registerAnother');
            buildRoleSelect('role');
            buildLanguageSelector();
        }

        async function submitRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.textContent = T('registering');

            const fullName = document.getElementById('fullName').value.trim();
            const idNumber = document.getElementById('idNumber').value.trim();
            const role = document.getElementById('role').value;

            try {
                const existing = await supabaseSelectWhere('workers', 'id_number', idNumber);
                if (existing && existing.length > 0) {
                    errorMsg.textContent = T('alreadyRegistered') + existing[0].worker_number;
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = T('registerBtn');
                    return;
                }

                const allWorkers = await supabaseSelectAll('workers');
                const nextNumber = (allWorkers.length > 0)
                    ? Math.max(...allWorkers.map(w => w.worker_number || 0)) + 1
                    : 100;

                await supabaseInsert('workers', {
                    full_name: fullName,
                    id_number: idNumber,
                    role: role,
                    worker_number: nextNumber
                });

                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').classList.add('show');
                document.getElementById('workerNumber').textContent = nextNumber;
                document.getElementById('summary').innerHTML =
                    `<strong>${T('lblName')}:</strong> ${fullName}<br>` +
                    `<strong>${T('lblIdNum')}:</strong> ${idNumber}<br>` +
                    `<strong>${T('lblRole')}:</strong> ${TRANSLATIONS[currentLang].roles[role]}<br>` +
                    `<strong>${T('lblWorkerNum')}:</strong> ${nextNumber}`;
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = T('registerBtn');
            }
        }

        function resetForm() {
            document.getElementById('registerForm').reset();
            document.getElementById('formView').style.display = 'block';
            document.getElementById('successView').classList.remove('show');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = T('registerBtn');
            document.getElementById('errorMsg').style.display = 'none';
        }

        buildLanguageSelector();
        applyTranslations();
    </script>
</body>
</html>
